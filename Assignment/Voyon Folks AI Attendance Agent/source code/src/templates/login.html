<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign In — Voyon Attendance Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#070810;--surface:rgba(20,22,30,.8);--border:rgba(255,255,255,.09);
      --border-strong:rgba(255,255,255,.15);--text:#eef0f7;--muted:#8b91a3;
      --accent:#6366f1;--accent2:#8b5cf6;--accent3:#22d3ee;
      --glow:rgba(99,102,241,.45);--err:#f87171;
    }
    html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text)}

    /* aurora */
    .aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;will-change:transform}
    .o1{width:520px;height:520px;background:radial-gradient(circle,#6366f1,transparent 70%);top:-180px;left:-100px;animation:d1 18s ease-in-out infinite}
    .o2{width:460px;height:460px;background:radial-gradient(circle,#d946ef,transparent 70%);bottom:-160px;right:-80px;animation:d2 22s ease-in-out infinite}
    .o3{width:340px;height:340px;background:radial-gradient(circle,#22d3ee,transparent 70%);top:40%;left:50%;opacity:.22;animation:d3 26s ease-in-out infinite}
    @keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(100px,70px) scale(1.15)}}
    @keyframes d2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-80px,-50px) scale(1.2)}}
    @keyframes d3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-30%,-60%) scale(1.1)}}
    .grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,#000 0%,transparent 80%);pointer-events:none}

    /* card */
    .page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:420px;background:var(--surface);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid var(--border-strong);border-radius:24px;padding:44px 40px 40px;box-shadow:0 32px 80px -16px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.08)}

    .brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .brand-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#d946ef);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 8px 24px -6px var(--glow);animation:floaty 4s ease-in-out infinite;flex-shrink:0}
    @keyframes floaty{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(-4deg)}}
    .brand-text h1{font-size:18px;font-weight:700;letter-spacing:-.01em}
    .brand-text p{font-size:12px;color:var(--muted);margin-top:2px}

    .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.18));color:var(--accent2);border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:4px 12px;margin-bottom:24px;letter-spacing:.5px}
    .badge::before{content:'●';font-size:7px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    h2{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
    .sub{font-size:13px;color:var(--muted);margin-bottom:28px}

    .error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--err);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:20px}

    label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
    .field{margin-bottom:20px}
    input{width:100%;background:rgba(255,255,255,.055);border:1px solid var(--border);border-radius:12px;padding:12px 15px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.18)}
    input::placeholder{color:var(--muted)}

    .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.01em;font-family:inherit;transition:opacity .2s,transform .2s,box-shadow .2s;box-shadow:0 6px 20px -6px var(--glow);margin-top:4px}
    .btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 12px 30px -8px var(--glow)}
    .btn:active{transform:translateY(0)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .footer{text-align:center;font-size:12px;color:var(--muted);margin-top:24px}
    .footer span{color:var(--accent2);font-weight:600}
  </style>
</head>
<body>
  <div class="aurora">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>
  <div class="grid"></div>

  <div class="page">
    <div class="card">
      <div class="brand">
        <div class="brand-icon">🕐</div>
        <div class="brand-text">
          <h1>Voyon Folks</h1>
          <p>Attendance Intelligence</p>
        </div>
      </div>



      {% if error %}
      <div class="error">⚠ {{ error }}</div>
      {% endif %}

      <form method="post" action="/login" id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Your HRMS username" autocomplete="username" required/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn" id="submitBtn">Sign In</button>
      </form>

      <p class="footer">Powered by <span>Voyon HRMS</span></p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function() {
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
    });
  </script>
</body>
</html>
